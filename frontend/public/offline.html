<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fitlo — Offline</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc; color: #0f172a; padding: 24px;
      }
      @media (prefers-color-scheme: dark) { body { background: #0b1220; color: #e2e8f0; } }
      .card { max-width: 420px; text-align: center; }
      .logo { width: 64px; height: 64px; border-radius: 16px; background: #2563eb; margin: 0 auto 20px;
        display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 16px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #64748b; margin: 4px 0; line-height: 1.6; }
      @media (prefers-color-scheme: dark) { p { color: #94a3b8; } }
      button { margin-top: 20px; border: 0; background: #2563eb; color: #fff; font-weight: 600;
        padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 15px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">fitlo</div>
      <h1>You're offline · شما آفلاین هستید</h1>
      <p>fitlo needs a connection to load this page.</p>
      <p>برای بارگذاری این صفحه به اینترنت نیاز است.</p>
      <button onclick="location.reload()">Retry · تلاش مجدد</button>
    </div>
  </body>
</html>
