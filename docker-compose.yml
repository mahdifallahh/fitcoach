# ──────────────────────────────────────────────────────────────────────────
# Local development stack: Postgres, MinIO (+ bucket init), and the single
# fitlo Next.js app (UI + /api Route Handlers).
# Usage:  cp .env.example .env  &&  docker compose up --build
# ──────────────────────────────────────────────────────────────────────────
name: fitlo

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: waits for MinIO, creates buckets, and makes avatars/gifs/pdfs
  # publicly readable. `requests` (intake photos/receipts) stays private.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${S3_BUCKET_AVATARS};
      mc mb --ignore-existing local/${S3_BUCKET_GIFS};
      mc mb --ignore-existing local/${S3_BUCKET_PDFS};
      mc mb --ignore-existing local/${S3_BUCKET_REQUESTS};
      mc anonymous set download local/${S3_BUCKET_AVATARS};
      mc anonymous set download local/${S3_BUCKET_GIFS};
      mc anonymous set download local/${S3_BUCKET_PDFS};
      echo 'MinIO buckets ready (requests stays private)';
      "

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: ${APP_PORT:-3000}
      # Reliable file watching over Windows/Docker bind mounts (detects new files).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
  minio_data:
  app_node_modules:
  app_next:
